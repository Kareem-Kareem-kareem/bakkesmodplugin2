name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Visual Studio
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Download SDK
        shell: powershell
        run: |
          $urls = @(
            "https://bakkesmod.com/sdk.zip",
            "https://github.com/bakkesmodorg/BakkesModSDK/releases/download/v1.0/sdk.zip"
          )
          foreach ($url in $urls) {
            try {
              Write-Host "Trying $url"
              Invoke-WebRequest -Uri $url -OutFile sdk.zip -UserAgent "Mozilla/5.0"
              Expand-Archive -Path sdk.zip -DestinationPath C:\sdk -Force
              Remove-Item sdk.zip
              break
            } catch {
              Write-Host "Failed, trying next..."
            }
          }

      - name: Set SDK env
        shell: powershell
        run: echo "BAKKESMOD_SDK=C:\sdk" >> $env:GITHUB_ENV

      - name: Build plugin
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja
          if errorlevel 1 exit /b 1
          cmake --build . --config Release
          if errorlevel 1 exit /b 1

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: SimpleGreeter
          path: build/Release/SimpleGreeter.dll
