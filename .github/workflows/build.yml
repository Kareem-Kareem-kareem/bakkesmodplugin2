name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Visual Studio environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@v4

    - name: Download BakkesMod SDK (official release)
      shell: powershell
      run: |
        $url = "https://github.com/bakkesmodorg/BakkesModSDK/releases/download/v1.0/sdk.zip"
        $out = "sdk.zip"
        Invoke-WebRequest -Uri $url -OutFile $out -UserAgent "Mozilla/5.0"
        Expand-Archive -Path $out -DestinationPath C:\bakkesmodsdk -Force
        Remove-Item $out

    - name: Set SDK environment variable
      shell: powershell
      run: |
        echo "BAKKESMOD_SDK=C:\bakkesmodsdk" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Build plugin
      shell: cmd
      run: |
        mkdir build
        cd build
        cmake .. -G Ninja
        if errorlevel 1 exit /b 1
        cmake --build . --config Release
        if errorlevel 1 exit /b 1

    - name: Upload Artifact (DLL)
      uses: actions/upload-artifact@v4
      with:
        name: SimpleGreeter
        path: build/Release/SimpleGreeter.dll

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: build/Release/SimpleGreeter.dll
        asset_name: SimpleGreeter.dll
        asset_content_type: application/octet-stream
