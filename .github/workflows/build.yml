name: Build Plugin

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout your plugin
        uses: actions/checkout@v4

      - name: Setup Visual Studio
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Clone and build BakkesMod SDK
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/bakkesmodorg/BakkesModSDK.git C:\sdk
          cd C:\sdk
          mkdir build
          cd build
          cmake .. -G Ninja
          cmake --build . --config Release

      - name: Build your plugin
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja -DBAKKESMOD_SDK=C:/sdk
          cmake --build . --config Release

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: UltraSimple
          path: build/Release/UltraSimple.dll
