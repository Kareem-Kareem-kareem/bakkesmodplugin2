name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Visual Studio environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@v4

    - name: Clone and build BakkesMod SDK
      shell: powershell
      run: |
        # Remove any old SDK folder to avoid conflicts
        if (Test-Path C:\bakkesmodsdk) { Remove-Item -Recurse -Force C:\bakkesmodsdk }
        git clone --depth 1 https://github.com/bakkesmodorg/BakkesModSDK.git C:\bakkesmodsdk
        cd C:\bakkesmodsdk
        mkdir build
        cd build
        cmake .. -G Ninja
        cmake --build . --config Release
        # Copy the resulting .lib to a known location
        mkdir C:\bakkesmodsdk\lib -ErrorAction SilentlyContinue
        copy Release\BakkesModPlugin.lib C:\bakkesmodsdk\lib\

    - name: Set SDK env
      shell: powershell
      run: |
        echo "BAKKESMOD_SDK=C:\bakkesmodsdk" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Build plugin
      run: |
        mkdir build
        cd build
        cmake .. -G Ninja
        cmake --build . --config Release
      working-directory: ${{ github.workspace }}

    - name: Upload Artifact (DLL)
      uses: actions/upload-artifact@v4
      with:
        name: SpawnMiddle
        path: build/Release/SpawnMiddle.dll

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: build/Release/SpawnMiddle.dll
        asset_name: SpawnMiddle.dll
        asset_content_type: application/octet-stream
