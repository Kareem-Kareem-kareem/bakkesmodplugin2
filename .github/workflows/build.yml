name: Build
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: seanmiddleditch/gha-setup-ninja@v4
      - run: ./build.ps1
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: HelloPlugin
          path: build/Release/HelloPlugin.dll
