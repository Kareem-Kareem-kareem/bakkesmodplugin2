name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Visual Studio environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@v4

    - name: Cache BakkesMod SDK
      id: cache-sdk
      uses: actions/cache@v3
      with:
        path: C:\bakkesmodsdk
        key: bakkesmod-sdk-v1

    - name: Download BakkesMod SDK (direct link from bakkesmod.com)
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        # Try the official download (might fail, but fallback to a known working mirror)
        $urls = @(
          "https://bakkesmod.com/sdk.zip",
          "https://github.com/bakkesmodorg/BakkesModSDK/releases/download/v1.0/sdk.zip"
        )
        $downloaded = $false
        foreach ($url in $urls) {
          try {
            Write-Host "Trying $url"
            Invoke-WebRequest -Uri $url -OutFile sdk.zip -UserAgent "Mozilla/5.0"
            $downloaded = $true
            break
          } catch {
            Write-Host "Failed: $_"
          }
        }
        if (-not $downloaded) {
          Write-Error "All download attempts failed."
          exit 1
        }
        Expand-Archive -Path sdk.zip -DestinationPath C:\bakkesmodsdk -Force
        Remove-Item sdk.zip

    - name: Set SDK env (always)
      shell: powershell
      run: |
        echo "BAKKESMOD_SDK=C:\bakkesmodsdk" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Create Build Directory
      run: mkdir build

    - name: Configure CMake
      run: cmake .. -G Ninja
      working-directory: build

    - name: Build Release
      run: cmake --build . --config Release
      working-directory: build

    - name: Upload Artifact (DLL)
      uses: actions/upload-artifact@v4
      with:
        name: SpawnMiddle
        path: build/Release/SpawnMiddle.dll

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: build/Release/SpawnMiddle.dll
        asset_name: SpawnMiddle.dll
        asset_content_type: application/octet-stream
