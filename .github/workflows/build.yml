name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Download and extract official SDK
        shell: cmd
        run: |
          powershell -Command "Invoke-WebRequest -Uri https://bakkesmod.com/sdk.zip -OutFile sdk.zip -UserAgent 'Mozilla/5.0'"
          powershell -Command "Expand-Archive sdk.zip -DestinationPath C:\sdk_temp"
          :: Move contents out of any subfolder
          if exist C:\sdk_temp\* ( move C:\sdk_temp\* C:\sdk )
          rmdir /s /q C:\sdk_temp
          :: Verify header and lib
          if not exist C:\sdk\include\bakkesmod\plugin\bakkesmodplugin.h exit /b 1
          if not exist C:\sdk\lib\BakkesModPlugin.lib exit /b 1

      - name: Build plugin
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja
          cmake --build . --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: UltraSimple
          path: build/Release/UltraSimple.dll
