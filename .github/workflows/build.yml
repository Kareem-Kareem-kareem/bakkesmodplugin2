name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Visual Studio environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Clone and build BakkesMod SDK (source)
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/bakkesmodorg/BakkesModSDK.git C:\sdk
          cd C:\sdk
          mkdir build
          cd build
          cmake .. -G Ninja
          cmake --build . --config Release
          :: Copy the .lib to a known location
          mkdir C:\sdk\lib
          copy Release\BakkesModPlugin.lib C:\sdk\lib\

      - name: Set SDK environment variable
        shell: cmd
        run: echo BAKKESMOD_SDK=C:\sdk>>%GITHUB_ENV%

      - name: Build plugin
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja
          cmake --build . --config Release

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: SimpleGreeter
          path: build/Release/SimpleGreeter.dll

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/Release/SimpleGreeter.dll
          asset_name: SimpleGreeter.dll
          asset_content_type: application/octet-stream
