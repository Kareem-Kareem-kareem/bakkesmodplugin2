name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Clone BakkesMod SDK
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/bakkesmodorg/BakkesModSDK.git C:\sdk
          if (-not (Test-Path "C:\sdk\include\bakkesmod\plugin\bakkesmodplugin.h")) {
            Write-Error "SDK clone failed - headers missing"
            exit 1
          }
          # The SDK repo doesn't have a pre-built .lib, but we don't need one
          # for the build to work - the headers are enough for compilation

      - name: Build plugin
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja
          cmake --build . --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: UltraSimple
          path: build/Release/UltraSimple.dll
