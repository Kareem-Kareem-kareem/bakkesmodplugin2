name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Visual Studio environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@v4

    - name: Cache BakkesMod SDK (built)
      id: cache-sdk
      uses: actions/cache@v3
      with:
        path: C:\bakkesmodsdk
        key: bakkesmod-sdk-v2-${{ runner.os }}

    - name: Build BakkesMod SDK from source
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        # Clean slate
        if (Test-Path C:\bakkesmodsdk) {
          Remove-Item -Recurse -Force C:\bakkesmodsdk
        }
        Write-Host "Cloning SDK..."
        git clone --depth 1 https://github.com/bakkesmodorg/BakkesModSDK.git C:\bakkesmodsdk
        if (-not (Test-Path C:\bakkesmodsdk\CMakeLists.txt)) {
          Write-Error "Clone failed – CMakeLists.txt not found in root."
          exit 1
        }
        Write-Host "Building SDK..."
        New-Item -ItemType Directory -Path C:\bakkesmodsdk\build -Force | Out-Null
        Set-Location C:\bakkesmodsdk\build
        cmake .. -G Ninja
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }
        cmake --build . --config Release
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }
        # Copy the .lib to a predictable location
        $libSource = "C:\bakkesmodsdk\build\Release\BakkesModPlugin.lib"
        if (-not (Test-Path $libSource)) {
          Write-Error "BakkesModPlugin.lib not built at $libSource"
          exit 1
        }
        New-Item -ItemType Directory -Path C:\bakkesmodsdk\lib -Force | Out-Null
        Copy-Item $libSource C:\bakkesmodsdk\lib\ -Force
        Write-Host "SDK built successfully."

    - name: Set SDK environment variable
      shell: powershell
      run: |
        echo "BAKKESMOD_SDK=C:\bakkesmodsdk" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Verify SDK installation
      shell: powershell
      run: |
        $sdk = $env:BAKKESMOD_SDK
        Write-Host "SDK path: $sdk"
        if (-not (Test-Path "$sdk\include\bakkesmod\plugin\bakkesmodplugin.h")) {
          Write-Error "Headers missing – SDK not properly set up."
          exit 1
        }
        if (-not (Test-Path "$sdk\lib\BakkesModPlugin.lib")) {
          Write-Error "BakkesModPlugin.lib missing – SDK build failed."
          exit 1
        }
        Write-Host "SDK verification passed."

    - name: Build plugin
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path build -Force | Out-Null
        Set-Location build
        cmake .. -G Ninja
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }
        cmake --build . --config Release
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }

    - name: Upload Artifact (DLL)
      uses: actions/upload-artifact@v4
      with:
        name: SpawnMiddle
        path: build/Release/SpawnMiddle.dll

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: build/Release/SpawnMiddle.dll
        asset_name: SpawnMiddle.dll
        asset_content_type: application/octet-stream
