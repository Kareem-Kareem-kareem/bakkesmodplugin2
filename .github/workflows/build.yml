name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Cache BakkesMod SDK
      id: cache-sdk
      uses: actions/cache@v3
      with:
        path: C:\bakkesmodsdk
        key: bakkesmod-sdk-clone

    - name: Clone BakkesMod SDK from GitHub
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        git clone --depth 1 https://github.com/bakkesmodorg/BakkesModSDK.git C:\bakkesmodsdk
        echo "BAKKESMOD_SDK=C:\bakkesmodsdk" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Set SDK env (if cached)
      if: steps.cache-sdk.outputs.cache-hit == 'true'
      shell: powershell
      run: |
        echo "BAKKESMOD_SDK=C:\bakkesmodsdk" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Create Build Directory
      run: mkdir build

    - name: Configure CMake
      run: cmake .. -G "Visual Studio 16 2019" -A x64
      working-directory: build

    - name: Build Release
      run: cmake --build . --config Release
      working-directory: build

    - name: Upload Artifact (DLL)
      uses: actions/upload-artifact@v4
      with:
        name: SpawnMiddle
        path: build/Release/SpawnMiddle.dll

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: build/Release/SpawnMiddle.dll
        asset_name: SpawnMiddle.dll
        asset_content_type: application/octet-stream
