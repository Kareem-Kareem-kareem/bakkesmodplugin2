name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Clone and build BakkesMod SDK
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/bakkesmodorg/BakkesModSDK.git C:\sdk
          cd C:\sdk
          mkdir build
          cd build
          cmake .. -G Ninja
          cmake --build . --config Release
          :: Find the generated .lib and copy it to C:\sdk\lib
          for /r %%i in (BakkesModPlugin.lib) do copy "%%i" C:\sdk\lib\
          :: If the above fails, try a direct copy from expected location
          if not exist C:\sdk\lib\BakkesModPlugin.lib (
            if exist Release\BakkesModPlugin.lib copy Release\BakkesModPlugin.lib C:\sdk\lib\
          )
          :: Verify it exists
          if not exist C:\sdk\lib\BakkesModPlugin.lib exit /b 1

      - name: Build your plugin
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja -DBAKKESMOD_SDK=C:/sdk
          cmake --build . --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: UltraSimple
          path: build/Release/UltraSimple.dll
