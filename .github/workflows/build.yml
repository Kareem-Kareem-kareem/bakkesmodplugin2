name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Visual Studio environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@v4

    - name: Cache BakkesMod SDK
      id: cache-sdk
      uses: actions/cache@v3
      with:
        path: C:\bakkesmodsdk
        key: bakkesmod-sdk-release

    - name: Download BakkesMod SDK (latest release)
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        # Get the latest release download URL for sdk.zip
        $release = Invoke-RestMethod -Uri "https://api.github.com/repos/bakkesmodorg/BakkesModSDK/releases/latest"
        $asset = $release.assets | Where-Object { $_.name -eq "sdk.zip" }
        if (-not $asset) {
          Write-Error "sdk.zip not found in the latest release."
          exit 1
        }
        $url = $asset.browser_download_url
        Write-Host "Downloading SDK from $url"
        Invoke-WebRequest -Uri $url -OutFile sdk.zip -UserAgent "Mozilla/5.0"
        Expand-Archive -Path sdk.zip -DestinationPath C:\bakkesmodsdk -Force
        Remove-Item sdk.zip

    - name: Set SDK env (always)
      shell: powershell
      run: |
        echo "BAKKESMOD_SDK=C:\bakkesmodsdk" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Create Build Directory
      run: mkdir build

    - name: Configure CMake
      run: cmake .. -G Ninja
      working-directory: build

    - name: Build Release
      run: cmake --build . --config Release
      working-directory: build

    - name: Upload Artifact (DLL)
      uses: actions/upload-artifact@v4
      with:
        name: SpawnMiddle
        path: build/Release/SpawnMiddle.dll

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: build/Release/SpawnMiddle.dll
        asset_name: SpawnMiddle.dll
        asset_content_type: application/octet-stream
